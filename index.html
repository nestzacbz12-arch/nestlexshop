<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>NestleXshop ⚡</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#001f3f;
  color:white;
}

/* เมนู */
.nav{
  background:black;
  padding:10px;
  display:flex;
  justify-content:space-between;
}

.nav button{
  background:cyan;
  border:none;
  padding:8px;
  border-radius:10px;
}

.container{
  padding:20px;
  text-align:center;
}

.card{
  background:#000000aa;
  margin:20px;
  padding:20px;
  border-radius:15px;
  box-shadow:0 0 20px cyan;
}

/* ซ่อน */
.hidden{
  display:none;
}
</style>
</head>

<body>

<!-- 🔝 เมนู -->
<div class="nav">
  <div>
    <button onclick="showPage('shop')">🛒 ขายไอดี</button>
    <button onclick="showPage('topup')">💰 เติมพ้อย</button>
  </div>

  <div id="userInfo">ยังไม่ได้ล็อกอิน</div>
</div>

<div class="container">

<!-- 🔐 หน้า Login -->
<div id="loginPage">
  <div class="card">
    <h2>🔐 ล็อกอิน</h2>
    <input id="user" placeholder="ชื่อ"><br><br>
    <input id="pass" type="password" placeholder="รหัส"><br><br>

    <button onclick="register()">สมัคร</button>
    <button onclick="login()">ล็อกอิน</button>

    <p id="status"></p>
  </div>
</div>

<!-- 🛒 หน้า Shop -->
<div id="shopPage" class="hidden">

  <div class="card">
    <h2>🔥 Free Fire</h2>
    <p>ราคา 300 พ้อย</p>
    <button onclick="buy(300)">ซื้อ</button>
  </div>

  <div class="card">
    <h2>⚔️ ROV</h2>
    <p>ราคา 500 พ้อย</p>
    <button onclick="buy(500)">ซื้อ</button>
  </div>

</div>

<!-- 💰 หน้า Topup -->
<div id="topupPage" class="hidden">
  <div class="card">
    <h2>เติมพ้อย</h2>
    <button onclick="addPoints(100)">เติม 100</button>
  </div>
</div>

</div>

<script>
let currentUser = null;
let points = 0;

function register(){
  let u = user.value;
  let p = pass.value;

  localStorage.setItem(u,p);
  localStorage.setItem(u+"_points",0);

  status.innerText="สมัครสำเร็จ";
}

function login(){
  let u = user.value;
  let p = pass.value;

  if(localStorage.getItem(u) === p){
    currentUser = u;
    points = Number(localStorage.getItem(u+"_points"));

    loginPage.classList.add("hidden");
    shopPage.classList.remove("hidden");

    updateUI();
  }else{
    status.innerText="ผิด";
  }
}

function updateUI(){
  userInfo.innerText = "👤 "+currentUser+" | 💰 "+points+" พ้อย";
}

function showPage(page){
  if(!currentUser){
    alert("กรุณาล็อกอินก่อน");
    return;
  }

  shopPage.classList.add("hidden");
  topupPage.classList.add("hidden");

  if(page==="shop") shopPage.classList.remove("hidden");
  if(page==="topup") topupPage.classList.remove("hidden");
}

function addPoints(amount){
  points += amount;
  localStorage.setItem(currentUser+"_points",points);
  updateUI();
}

function buy(price){
  if(points < price){
    alert("พ้อยไม่พอ");
    return;
  }

  points -= price;
  localStorage.setItem(currentUser+"_points",points);
  updateUI();

  alert("ซื้อสำเร็จ! (ระบบส่งไอดีจะทำต่อ)");
}
</script>

</body>
</html>
