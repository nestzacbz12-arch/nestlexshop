<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>NestleXshop ⚡</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: radial-gradient(circle,#001f3f,#000);
  color:white;
  text-align:center;
  overflow-x:hidden;
}

/* เอฟเฟกต์สายฟ้า */
body::before {
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background: url("https://i.ibb.co/4R2Kc0H/lightning.png");
  opacity:0.1;
  animation:flash 2s infinite;
}

@keyframes flash {
  0%{opacity:0.1;}
  50%{opacity:0.3;}
  100%{opacity:0.1;}
}

h1 {
  font-size:45px;
  margin-top:20px;
  text-shadow:0 0 20px cyan, 0 0 40px blue;
}

.card {
  background:rgba(0,0,0,0.7);
  margin:20px;
  padding:20px;
  border-radius:20px;
  box-shadow:0 0 25px cyan;
  transition:0.3s;
}

.card:hover {
  transform:scale(1.05);
  box-shadow:0 0 40px cyan;
}

button {
  background:linear-gradient(45deg,cyan,blue);
  border:none;
  padding:12px 25px;
  border-radius:15px;
  font-weight:bold;
  color:white;
  cursor:pointer;
  box-shadow:0 0 10px cyan;
}

button:hover {
  box-shadow:0 0 20px cyan;
}

.topbar {
  background:#000;
  padding:10px;
  box-shadow:0 0 15px cyan;
}
</style>

</head>

<body>

<div class="topbar">
  ⚡ NestleXshop | Free Fire & ROV ⚡
</div>

<h1>⚡ NestleXshop ⚡</h1>
<p>ร้านขายไอดีเกมสุดเทพ 💎</p>

<div class="card">
  <h2>🔥 Free Fire ID เทพ</h2>
  <p>สกินแน่น / ปืนครบ</p>
  <p>💰 300 บาท</p>
  <button onclick="buy('Free Fire',300)">ซื้อเลย</button>
</div>

<div class="card">
  <h2>⚔️ ROV ID แรงค์สูง</h2>
  <p>ฮีโร่ครบ / แรงค์ Conqueror</p>
  <p>💰 500 บาท</p>
 <button onclick="buy('ROV',500)">ซื้อเลย</button>
</div>

<script>
<script>
function buy(game, price){

  let promptpay = "0966855206"; //

  alert(
    "ซื้อ " + game + "\n" +
    "ราคา: " + price + " บาท\n\n" +
    "👉 โอนเงินมาที่:\n" + promptpay + "\n\n" +
    "แล้วทักแอดมินเพื่อรับไอดี 🔥"
  );

}
</script><script>
function register(){
  let user = document.getElementById("user").value;
  let pass = document.getElementById("pass").value;

  localStorage.setItem(user, pass);
  document.getElementById("status").innerText = "สมัครสำเร็จ!";
}

function login(){
  let user = document.getElementById("user").value;
  let pass = document.getElementById("pass").value;

  let saved = localStorage.getItem(user);

  if(saved === pass){
    document.getElementById("status").innerText = "ล็อกอินสำเร็จ 🎉";
  } else {
    document.getElementById("status").innerText = "ข้อมูลไม่ถูกต้อง ❌";
  }
}
   </script>
}
</script>

</body><div class="card">
  <h2>🔐 เข้าสู่ระบบ</h2>

  <input id="user" placeholder="ชื่อผู้ใช้"><br><br>
  <input id="pass" type="password" placeholder="รหัสผ่าน"><br><br>

  <button onclick="register()">สมัคร</button>
  <button onclick="login()">ล็อกอิน</button>

  <p id="status"></p>
</div>
</html>
