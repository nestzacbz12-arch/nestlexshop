<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>NestleXshop ⚡</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0f1a;
  color:white;
}

/* NAVBAR */
.nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#05070f;
  padding:12px;
  box-shadow:0 0 20px #00f0ff;
}

.logo{
  font-size:20px;
  font-weight:bold;
  color:#00f0ff;
}

.nav button{
  margin-right:10px;
  background:#00f0ff;
  border:none;
  padding:6px 12px;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}

/* CONTAINER */
.container{
  padding:20px;
  text-align:center;
}

/* GRID */
.grid{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
}

/* CARD */
.card{
  background:#111827;
  margin:15px;
  padding:15px;
  border-radius:12px;
  width:200px;
  box-shadow:0 0 15px #00f0ff55;
  transition:0.3s;
}

.card:hover{
  transform:scale(1.05);
  box-shadow:0 0 25px #00f0ff;
}

/* IMAGE */
.card img{
  width:100%;
  border-radius:10px;
}

/* BUTTON */
.card button{
  margin-top:10px;
  background:#00f0ff;
  border:none;
  padding:8px;
  border-radius:8px;
  font-weight:bold;
}

/* INPUT */
input{
  padding:8px;
  border-radius:10px;
  border:none;
}

/* HIDE */
.hidden{
  display:none;
}
</style>
</head>
