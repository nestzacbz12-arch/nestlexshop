<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>NestleXshop ⚡</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #001f3f, #007bff);
      color: white;
      text-align: center;
    }
    h1 {
      font-size: 40px;
      margin-top: 20px;
      text-shadow: 0 0 20px cyan;
    }
    .card {
      background: rgba(0,0,0,0.5);
      margin: 20px;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 0 20px cyan;
    }
    button {
      background: cyan;
      border: none;
      padding: 10px 20px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
    }
  </style>
</head>
<body>

<h1>⚡ NestleXshop ⚡</h1>
<p>ขายไอดีเกม Free Fire / ROV</p>

<div class="card">
  <h2>🔥 Free Fire ID เทพ</h2>
  <p>ราคา: 300 บาท</p>
  <button onclick="buy()">ซื้อเลย</button>
</div>

<div class="card">
  <h2>⚔️ ROV ID แรงค์สูง</h2>
  <p>ราคา: 500 บาท</p>
  <button onclick="buy()">ซื้อเลย</button>
</div>

<script>
function buy(){
  alert("ระบบกำลังพัฒนา 🔥");
}
</script>

</body>
</html>
